name: Build images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  CI: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      images: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            devshell:
              - 'images/devshell/**'
              - '.github/workflows/build.yml'
            postgres:
              - 'images/postgres/**'
              - '.github/workflows/build.yml'
            webtest:
              - 'images/webtest/**'
              - '.github/workflows/build.yml'
            ollama:
              - 'images/ollama/**'
              - '.github/workflows/build.yml'
            mineru:
              - 'images/mineru/**'
              - '.github/workflows/build.yml'
            mongodb:
              - 'images/mongodb/**'
              - '.github/workflows/build.yml'
            grafana:
              - 'images/grafana/**'
              - '.github/workflows/build.yml'

  build:
    needs: changes
    if: ${{ needs.changes.outputs.images != '[]' && needs.changes.outputs.images != '' }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.changes.outputs.images) }}
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }} (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: ./images/${{ matrix.image }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest-${{ matrix.arch }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifests:
    needs: [build, changes]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Create and push multi-arch manifests
        run: |
          SHA="${{ github.sha }}"
          SHA_SHORT="${SHA:0:7}"
          CHANGED='${{ needs.changes.outputs.images }}'

          for img in $(echo "$CHANGED" | jq -r '.[]'); do
            case "$img" in
              postgres) VERSION_TAG="17" ;;
              *) VERSION_TAG="latest" ;;
            esac

            docker buildx imagetools create -t \
              "ghcr.io/${{ github.repository_owner }}/${img}:${VERSION_TAG}" \
              "ghcr.io/${{ github.repository_owner }}/${img}:latest-amd64" \
              "ghcr.io/${{ github.repository_owner }}/${img}:latest-arm64"

            docker buildx imagetools create -t \
              "ghcr.io/${{ github.repository_owner }}/${img}:${SHA_SHORT}" \
              "ghcr.io/${{ github.repository_owner }}/${img}:${SHA}-amd64" \
              "ghcr.io/${{ github.repository_owner }}/${img}:${SHA}-arm64"
          done
