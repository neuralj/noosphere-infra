[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/sshd.log
stderr_logfile=/var/log/supervisor/sshd.log

[program:jupyterlab]
command=/opt/pyvenv/bin/jupyter lab --config=/home/travis/.jupyter/jupyter_server_config.py --notebook-dir=/noosphere --allow-root
user=travis
environment=HOME="/home/travis",PATH="/home/travis/.opencode/bin:/opt/pyvenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/jupyterlab.log
stderr_logfile=/var/log/supervisor/jupyterlab.log

[program:codeserver]
command=code-server --bind-addr 0.0.0.0:8080 --auth none
user=travis
environment=HOME="/home/travis",PATH="/home/travis/.opencode/bin:/opt/pyvenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",VSCODE_PROXY_URI="./proxy/{{port}}"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/codeserver.log
stderr_logfile=/var/log/supervisor/codeserver.log

[program:opencode-server]
command=/home/travis/.opencode/bin/opencode serve --port 4096 --hostname 0.0.0.0
user=travis
directory=/home/travis
environment=HOME="/home/travis",PATH="/home/travis/.opencode/bin:/opt/pyvenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/opencode-server.log
stderr_logfile=/var/log/supervisor/opencode-server.log
